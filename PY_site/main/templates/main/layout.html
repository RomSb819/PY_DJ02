{% load static %}
<!doctype html>

<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>
        {% block title %}
        <Берегите природу>
        {% endblock %}
    </title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Твои стили -->
    <link rel="stylesheet" href="{% static 'main/css/main.css' %}">
</head>
<body class="bg-light">

    <div class="container-fluid">
        <div class="row min-vh-100">

            <!-- Боковое меню -->
            <aside class="col-12 col-md-3 col-lg-2 bg-dark text-white p-4 shadow">
                <div class="text-center mb-4">
                    <img src="{% static 'main/img/forest.png' %}" alt="лес" class="img-fluid rounded mb-3" style="max-width: 120px;">
                    <h3 class="fw-bold">Берегите природу</h3>
                    <p class="text-secondary small mb-0">Учебный проект</p>
                </div>

                <nav>
                    <ul class="nav flex-column gap-2">
                        <li class="nav-item">
                            <a href="{% url 'home' %}" class="nav-link text-white rounded px-3 py-2 menu-link">
                                <i class="bi bi-house-door-fill me-2"></i>Главная
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="{% url 'page2' %}" class="nav-link text-white rounded px-3 py-2 menu-link">
                                <i class="bi bi-grid-fill me-2"></i>Второстепенная
                            </a>
                        </li>
                    </ul>
                </nav>
            </aside>

            <!-- Основной контент -->
            <main class="col-12 col-md-9 col-lg-10 p-4">
                <div class="bg-white rounded-4 shadow-sm p-4 h-100">
                    {% block content %}
                    {% endblock %}
                </div>
            </main>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
